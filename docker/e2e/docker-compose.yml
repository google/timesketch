services:
  timesketch:
    environment:
      - POSTGRES_USER=timesketch
      - POSTGRES_PASSWORD=password
      - POSTGRES_ADDRESS=postgres
      - POSTGRES_PORT=5432
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - REDIS_ADDRESS=redis
      - REDIS_PORT=6379
      - TIMESKETCH_USER=test
      - TIMESKETCH_PASSWORD=test
      - TIMESKETCH_ADMIN_USER=admin
      - TIMESKETCH_ADMIN_USER_PASSWORD=admin
      - TIMESKETCH_USER2=test2
      - TIMESKETCH_PASSWORD2=test2
      # To enable telemetry, set TIMESKETCH_OTEL_MODE=otlp-grpc when running E2E tests with '--profile telemetry'
      - TIMESKETCH_OTEL_MODE=${TIMESKETCH_OTEL_MODE:-}
      - TIMESKETCH_OTLP_GRPC_ENDPOINT=${TIMESKETCH_OTLP_GRPC_ENDPOINT:-otel-collector:4317}
    build:
      context: ../../
      dockerfile: ./docker/e2e/Dockerfile
      args:
          UBUNTU_VERSION: ${UBUNTU_VERSION:-26.04}
          PLASO_PPA_TRACK: ${PLASO_PPA_TRACK:-stable}
    ports:
      - "127.0.0.1:80:80"
    links:
      - opensearch
      - postgres
      - redis
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    volumes:
      - ../../:/usr/local/src/timesketch/

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.5}
    restart: always
    environment:
      - TAKE_FILE_OWNERSHIP=1
      - discovery.type=single-node
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "search.query.max_query_string_length=50000"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=50s"]
      interval: 10s
      timeout: 60s
      retries: 5

  postgres:
    image: postgres
    environment:
      - POSTGRES_USER=timesketch
      - POSTGRES_PASSWORD=password
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesketch -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  otel-collector:
    image: otel/opentelemetry-collector:0.100.0
    user: "0"
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../../data/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "127.0.0.1:4319:4317"
      - "127.0.0.1:4320:4318"
    depends_on:
      - jaeger
    profiles:
      - telemetry
  jaeger:
    image: jaegertracing/jaeger:2.17.0
    restart: always
    command:
      - "--set"
      - "receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317"
      - "--set"
      - "receivers.otlp.protocols.http.endpoint=0.0.0.0:4318"
    ports:
      - "127.0.0.1:16687:16686"
    profiles:
      - telemetry
